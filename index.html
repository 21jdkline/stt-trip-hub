<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STT 2026">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%2314b8a6' width='180' height='180'/><text x='50%25' y='50%25' font-size='80' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='white'>STT</text></svg>">
  <meta name="theme-color" content="#14b8a6">
  <title>STT 2026 | Trip Hub</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.min.js"></script>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
    html,body,#root { width:100%; height:100%; }
    @keyframes wave { 0%,100%{transform:rotate(0)} 25%{transform:rotate(20deg)} 75%{transform:rotate(-15deg)} }
    .wave { animation: wave 1.5s ease-in-out infinite; display:inline-block; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { Plane, MapPin, Utensils, Plus, X, Copy, Check, ChevronRight, Calendar, Sun, Users, Clock, Palmtree } = LucideReact;

/* ── Supabase config ── */
const SB_URL = "https://zcqtkqslrgwmpcizgaca.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjcXRrcXNscmd3bXBjaXpnYWNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1MTY0NDYsImV4cCI6MjA2MDA5MjQ0Nn0.gXsRaPT2JMZMBMfU3Oqp0MN7iFCExMfphKkuVwz8VjY";
const TRIP = "stt-2026";
const sb = (path, opts={}) => fetch(`${SB_URL}/rest/v1/${path}`, {
  ...opts,
  headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type":"application/json", Prefer: opts.method === "POST" ? "return=representation" : "return=representation", ...opts.headers }
});

/* ── Trip data ── */
const MEMBERS = [
  { name:"Jay",    idx:0, bg:"bg-blue-500",   text:"text-blue-700",  ring:"ring-blue-400",   light:"bg-blue-50",   border:"border-blue-200" },
  { name:"Ashley", idx:1, bg:"bg-pink-500",   text:"text-pink-700",  ring:"ring-pink-400",   light:"bg-pink-50",   border:"border-pink-200" },
  { name:"Brylee", idx:2, bg:"bg-purple-500", text:"text-purple-700",ring:"ring-purple-400", light:"bg-purple-50", border:"border-purple-200" },
  { name:"Breea",  idx:3, bg:"bg-amber-500",  text:"text-amber-700", ring:"ring-amber-400",  light:"bg-amber-50",  border:"border-amber-200" },
];

const DAYS = [
  { id:"day-1", date:"June 6",  label:"Arrival Day" },
  { id:"day-2", date:"June 7",  label:"Magens Bay" },
  { id:"day-3", date:"June 8",  label:"Town & Mountain Top" },
  { id:"day-4", date:"June 9",  label:"Coki Beach & Coral World" },
  { id:"day-5", date:"June 10", label:"St. John Day Trip" },
  { id:"day-6", date:"June 11", label:"Water Sports" },
  { id:"day-7", date:"June 12", label:"Last Day / Fly Home" },
];

/* ── App ── */
function App() {
  const [tab, setTab] = useState("picks");
  const [picks, setPicks] = useState({});
  const [loading, setLoading] = useState(true);
  const [selDay, setSelDay] = useState("day-1");
  const [selMember, setSelMember] = useState(0);
  const [newAct, setNewAct] = useState("");
  const [newRest, setNewRest] = useState("");
  const [copied, setCopied] = useState(false);
  const inputRef = useRef(null);

  /* Load picks from Supabase */
  useEffect(() => {
    sb(`picks?trip_slug=eq.${TRIP}&select=*`)
      .then(r => r.json())
      .then(rows => {
        const map = {};
        rows.forEach(r => { map[`${r.day_id}_${r.color_index}`] = r; });
        setPicks(map);
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  const getPick = (dayId, idx) => picks[`${dayId}_${idx}`] || { activities: [], restaurant: "" };

  /* Save helpers */
  const savePick = useCallback(async (dayId, memberIdx, activities, restaurant) => {
    const key = `${dayId}_${memberIdx}`;
    const existing = picks[key];
    const body = { trip_slug: TRIP, color_index: memberIdx, day_id: dayId, activities, restaurant, updated_at: new Date().toISOString() };
    let res;
    if (existing && existing.id) {
      res = await sb(`picks?id=eq.${existing.id}`, { method: "PATCH", body: JSON.stringify({ activities, restaurant, updated_at: body.updated_at }) });
    } else {
      res = await sb("picks", { method: "POST", body: JSON.stringify(body) });
    }
    const data = await res.json();
    const row = Array.isArray(data) ? data[0] : data;
    setPicks(prev => ({ ...prev, [key]: row }));
  }, [picks]);

  const addActivity = () => {
    if (!newAct.trim()) return;
    const p = getPick(selDay, selMember);
    const acts = [...(p.activities || []), newAct.trim()];
    savePick(selDay, selMember, acts, p.restaurant || "");
    setNewAct("");
    inputRef.current?.focus();
  };

  const removeActivity = (i) => {
    const p = getPick(selDay, selMember);
    const acts = (p.activities || []).filter((_, idx) => idx !== i);
    savePick(selDay, selMember, acts, p.restaurant || "");
  };

  const setRestaurant = () => {
    if (!newRest.trim()) return;
    const p = getPick(selDay, selMember);
    savePick(selDay, selMember, p.activities || [], newRest.trim());
    setNewRest("");
  };

  const clearRestaurant = () => {
    const p = getPick(selDay, selMember);
    savePick(selDay, selMember, p.activities || [], "");
  };

  const copyCode = () => {
    navigator.clipboard.writeText("AIO6OA");
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  /* Countdown */
  const daysUntil = Math.max(0, Math.ceil((new Date("2026-06-06") - new Date()) / 86400000));

  if (loading) return (
    <div className="min-h-screen bg-gradient-to-b from-teal-600 to-cyan-700 flex items-center justify-center">
      <div className="text-center text-white">
        <div className="text-6xl wave mb-4">🌊</div>
        <p className="text-xl font-semibold">Loading your trip...</p>
      </div>
    </div>
  );

  const dayData = DAYS.find(d => d.id === selDay);
  const curPick = getPick(selDay, selMember);
  const curMember = MEMBERS[selMember];

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <div className="bg-gradient-to-r from-teal-600 to-cyan-600 text-white px-4 py-4 shadow-lg">
        <div className="max-w-lg mx-auto flex items-center justify-between">
          <div>
            <h1 className="text-2xl font-bold tracking-tight flex items-center gap-2">
              <span>🏝️</span> STT 2026
            </h1>
            <p className="text-teal-100 text-sm">St. Thomas · June 6-12</p>
          </div>
          <div className="bg-white/20 rounded-full px-3 py-1 text-sm font-medium">
            {daysUntil} days!
          </div>
        </div>
      </div>

      {/* Tab bar */}
      <div className="bg-white border-b sticky top-0 z-30">
        <div className="max-w-lg mx-auto flex">
          {[
            { key:"overview", icon: <Sun size={16}/>, label:"Overview" },
            { key:"picks",   icon: <MapPin size={16}/>, label:"Daily Picks" },
            { key:"flights", icon: <Plane size={16}/>,  label:"Flights" },
          ].map(t => (
            <button key={t.key} onClick={() => setTab(t.key)}
              className={`flex-1 py-3 text-sm font-medium flex items-center justify-center gap-1.5 border-b-2 transition-colors ${
                tab === t.key ? "border-teal-500 text-teal-700" : "border-transparent text-gray-500 hover:text-gray-700"
              }`}>
              {t.icon}{t.label}
            </button>
          ))}
        </div>
      </div>

      <div className="max-w-lg mx-auto p-4 pb-20">
        {/* ─── OVERVIEW ─── */}
        {tab === "overview" && (
          <div className="space-y-4">
            {/* Countdown */}
            <div className="bg-gradient-to-br from-teal-500 to-cyan-600 rounded-2xl p-6 text-white text-center shadow-lg">
              <p className="text-5xl font-bold">{daysUntil}</p>
              <p className="text-teal-100 mt-1">days until St. Thomas!</p>
              <div className="flex justify-center gap-4 mt-4 text-sm">
                <span className="flex items-center gap-1"><Calendar size={14}/> June 6-12, 2026</span>
                <span className="flex items-center gap-1"><Users size={14}/> 4 travelers</span>
              </div>
            </div>

            {/* Members */}
            <div className="bg-white rounded-xl p-4 shadow-sm border">
              <h3 className="font-semibold text-gray-800 mb-3">The Crew</h3>
              <div className="grid grid-cols-4 gap-2">
                {MEMBERS.map(m => (
                  <div key={m.idx} className="text-center">
                    <div className={`w-12 h-12 ${m.bg} rounded-full mx-auto flex items-center justify-center text-white font-bold text-lg`}>
                      {m.name[0]}
                    </div>
                    <p className="text-xs mt-1 font-medium text-gray-700">{m.name}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Week at a Glance */}
            <div className="bg-white rounded-xl p-4 shadow-sm border">
              <h3 className="font-semibold text-gray-800 mb-3">Week at a Glance</h3>
              <div className="space-y-2">
                {DAYS.map(d => {
                  const totalActs = MEMBERS.reduce((sum, m) => sum + (getPick(d.id, m.idx).activities || []).length, 0);
                  const totalRest = MEMBERS.filter(m => getPick(d.id, m.idx).restaurant).length;
                  return (
                    <button key={d.id} onClick={() => { setSelDay(d.id); setTab("picks"); }}
                      className="w-full flex items-center justify-between p-3 rounded-lg bg-gray-50 hover:bg-teal-50 transition-colors text-left">
                      <div>
                        <p className="font-medium text-gray-800 text-sm">{d.date} — {d.label}</p>
                        <p className="text-xs text-gray-500">{totalActs} activities · {totalRest} restaurants</p>
                      </div>
                      <ChevronRight size={16} className="text-gray-400"/>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ─── DAILY PICKS ─── */}
        {tab === "picks" && (
          <div className="space-y-4">
            {/* Day selector */}
            <div className="sticky top-[53px] z-20 bg-gray-50 pt-1 pb-2 -mx-4 px-4">
              <div className="flex gap-1.5 overflow-x-auto pb-1 scrollbar-hide">
                {DAYS.map(d => (
                  <button key={d.id} onClick={() => setSelDay(d.id)}
                    className={`flex-shrink-0 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${
                      selDay === d.id ? "bg-teal-600 text-white shadow-md" : "bg-white text-gray-600 border hover:bg-gray-100"
                    }`}>
                    <div className="text-xs opacity-75">{d.date}</div>
                    <div>{d.label}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Member selector */}
            <div className="flex gap-2">
              {MEMBERS.map(m => (
                <button key={m.idx} onClick={() => setSelMember(m.idx)}
                  className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${
                    selMember === m.idx
                      ? `${m.bg} text-white shadow-md ring-2 ${m.ring} ring-offset-2`
                      : `bg-white ${m.text} border ${m.border} hover:${m.light}`
                  }`}>
                  {m.name}
                </button>
              ))}
            </div>

            {/* Current member's picks */}
            <div className={`${curMember.light} rounded-xl p-4 border ${curMember.border}`}>
              <h3 className={`font-bold ${curMember.text} mb-3`}>{curMember.name}'s Picks — {dayData.label}</h3>

              {/* Activities */}
              <div className="mb-4">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 flex items-center gap-1">
                  <MapPin size={12}/> Activities
                </p>
                {(curPick.activities || []).length === 0 && (
                  <p className="text-sm text-gray-400 italic mb-2">No activities yet — add some!</p>
                )}
                <div className="space-y-1.5 mb-2">
                  {(curPick.activities || []).map((a, i) => (
                    <div key={i} className="flex items-center justify-between bg-white rounded-lg px-3 py-2 shadow-sm">
                      <span className="text-sm text-gray-800">{a}</span>
                      <button onClick={() => removeActivity(i)} className="text-gray-400 hover:text-red-500 transition-colors">
                        <X size={16}/>
                      </button>
                    </div>
                  ))}
                </div>
                <div className="flex gap-2">
                  <input ref={inputRef} value={newAct} onChange={e => setNewAct(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addActivity()}
                    placeholder="Add an activity..." className="flex-1 text-sm border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400"/>
                  <button onClick={addActivity} className="bg-teal-500 text-white rounded-lg px-3 py-2 hover:bg-teal-600 transition-colors">
                    <Plus size={16}/>
                  </button>
                </div>
              </div>

              {/* Restaurant */}
              <div>
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 flex items-center gap-1">
                  <Utensils size={12}/> Restaurant Pick
                </p>
                {curPick.restaurant ? (
                  <div className="flex items-center justify-between bg-white rounded-lg px-3 py-2 shadow-sm">
                    <span className="text-sm text-gray-800">{curPick.restaurant}</span>
                    <button onClick={clearRestaurant} className="text-gray-400 hover:text-red-500 transition-colors">
                      <X size={16}/>
                    </button>
                  </div>
                ) : (
                  <div className="flex gap-2">
                    <input value={newRest} onChange={e => setNewRest(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && setRestaurant()}
                      placeholder="Pick a restaurant..." className="flex-1 text-sm border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400"/>
                    <button onClick={setRestaurant} className="bg-teal-500 text-white rounded-lg px-3 py-2 hover:bg-teal-600 transition-colors">
                      <Plus size={16}/>
                    </button>
                  </div>
                )}
              </div>
            </div>

            {/* Everyone's Picks summary */}
            <div className="bg-white rounded-xl p-4 border shadow-sm">
              <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <Users size={16}/> Everyone's Picks — {dayData.label}
              </h3>
              {MEMBERS.map(m => {
                const p = getPick(selDay, m.idx);
                const hasStuff = (p.activities || []).length > 0 || p.restaurant;
                return (
                  <div key={m.idx} className={`mb-3 last:mb-0 p-3 rounded-lg ${m.light} border ${m.border}`}>
                    <p className={`font-semibold text-sm ${m.text} mb-1`}>{m.name}</p>
                    {!hasStuff && <p className="text-xs text-gray-400 italic">No picks yet</p>}
                    {(p.activities || []).length > 0 && (
                      <div className="flex flex-wrap gap-1 mb-1">
                        {p.activities.map((a, i) => (
                          <span key={i} className="text-xs bg-white/70 rounded-full px-2 py-0.5 text-gray-700">{a}</span>
                        ))}
                      </div>
                    )}
                    {p.restaurant && (
                      <p className="text-xs text-gray-600 flex items-center gap-1"><Utensils size={10}/> {p.restaurant}</p>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ─── FLIGHTS ─── */}
        {tab === "flights" && (
          <div className="space-y-4">
            <div className="bg-white rounded-xl p-4 shadow-sm border">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-bold text-gray-800">Confirmation Code</h3>
                <button onClick={copyCode}
                  className="flex items-center gap-1 text-sm text-teal-600 hover:text-teal-800 font-medium">
                  {copied ? <><Check size={14}/> Copied!</> : <><Copy size={14}/> Copy</>}
                </button>
              </div>
              <div className="bg-teal-50 rounded-lg p-3 text-center">
                <p className="text-3xl font-mono font-bold tracking-widest text-teal-700">AIO6OA</p>
              </div>
            </div>

            {/* Outbound */}
            <div className="bg-white rounded-xl p-4 shadow-sm border">
              <p className="text-xs font-semibold text-teal-600 uppercase tracking-wide mb-2">Outbound · June 6</p>
              <div className="space-y-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-teal-100 rounded-full flex items-center justify-center">
                    <Plane size={18} className="text-teal-600"/>
                  </div>
                  <div className="flex-1">
                    <p className="font-semibold text-gray-800 text-sm">STL → MCO</p>
                    <p className="text-xs text-gray-500">Depart 6:00 AM · Arrive 9:30 AM</p>
                  </div>
                </div>
                <div className="border-l-2 border-dashed border-gray-200 ml-5 pl-6 py-1">
                  <p className="text-xs text-gray-400">Layover in Orlando · ~2h</p>
                </div>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-cyan-100 rounded-full flex items-center justify-center">
                    <Plane size={18} className="text-cyan-600"/>
                  </div>
                  <div className="flex-1">
                    <p className="font-semibold text-gray-800 text-sm">MCO → STT</p>
                    <p className="text-xs text-gray-500">Depart 11:30 AM · Arrive 3:45 PM</p>
                  </div>
                </div>
              </div>
            </div>

            {/* Return */}
            <div className="bg-white rounded-xl p-4 shadow-sm border">
              <p className="text-xs font-semibold text-pink-600 uppercase tracking-wide mb-2">Return · June 12</p>
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-pink-100 rounded-full flex items-center justify-center">
                  <Plane size={18} className="text-pink-600 transform rotate-180"/>
                </div>
                <div className="flex-1">
                  <p className="font-semibold text-gray-800 text-sm">STT → STL</p>
                  <p className="text-xs text-gray-500">Details TBD</p>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
