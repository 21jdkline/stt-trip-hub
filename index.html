<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STT 2026">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%2314b8a6' width='180' height='180'/><text x='50%' y='50%' font-size='80' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='white'>STT</text></svg>">
  <meta name="theme-color" content="#14b8a6">
  <title>STT 2026 | Trip Hub</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.min.js"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif; }
    html, body, #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React
    const { Plane, UtensilsCrossed, ShoppingBag, CheckSquare, DollarSign, Sun, Palmtree, Plus, X, Copy, Check, Calendar, Users, Zap } = lucideReact || window.lucideReact

    const SUPABASE_URL = 'https://zcqtkqslrgwmpcizgaca.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjcXRrcXNscmd3bXBjaXpnYWNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODcwODQsImV4cCI6MjA5MTE2MzA4NH0.gc-9yPPrzwgz5g2wiPnyRdfWKelik6eKyMn3SkSnaUs'
    const TRIP_SLUG = 'stt-2026'

    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }

    const memberColors = {
      0: { bg: 'bg-blue-500', text: 'text-blue-500', name: 'Jay' },
      1: { bg: 'bg-pink-500', text: 'text-pink-500', name: 'Ashley' },
      2: { bg: 'bg-purple-500', text: 'text-purple-500', name: 'Brylee' },
      3: { bg: 'bg-amber-500', text: 'text-amber-500', name: 'Breea' }
    }

    const packingCategories = ['Clothes', 'Toiletries', 'Beach', 'Documents', 'Electronics', 'Misc']
    const budgetCategories = ['Food', 'Activities', 'Transport', 'Shopping', 'Accommodation', 'Other']

    const tripDates = [
      { day: 'Sat, Jun 6', id: 'day-1' },
      { day: 'Sun, Jun 7', id: 'day-2' },
      { day: 'Mon, Jun 8', id: 'day-3' },
      { day: 'Tue, Jun 9', id: 'day-4' },
      { day: 'Wed, Jun 10', id: 'day-5' },
      { day: 'Thu, Jun 11', id: 'day-6' },
      { day: 'Fri, Jun 12', id: 'day-7' }
    ]

    function App() {
      const [activeTab, setActiveTab] = useState('overview')
      const [members, setMembers] = useState([])
      const [flights, setFlights] = useState([])
      const [seatAssignments, setSeatAssignments] = useState([])
      const [picks, setPicks] = useState([])
      const [packingItems, setPackingItems] = useState([])
      const [budgetItems, setBudgetItems] = useState([])
      const [selectedMember, setSelectedMember] = useState(0)
      const [daysRemaining, setDaysRemaining] = useState(0)
      const [copied, setCopied] = useState(false)
      const [packingFilter, setPackingFilter] = useState('all')
      const [newActivity, setNewActivity] = useState('')
      const [newRestaurant, setNewRestaurant] = useState('')
      const [selectedDay, setSelectedDay] = useState('day-1')

      // Calculate days remaining
      useEffect(() => {
        const departure = new Date('2026-06-06')
        const today = new Date()
        today.setHours(0, 0, 0, 0)
        const days = Math.ceil((departure - today) / (1000 * 60 * 60 * 24))
        setDaysRemaining(Math.max(0, days))
      }, [])

      // Fetch all data
      useEffect(() => {
        const fetchData = async () => {
          try {
            // Fetch members
            const membersRes = await fetch(
              `${SUPABASE_URL}/rest/v1/trip_members?trip_slug=eq.${TRIP_SLUG}&select=*`,
              { headers }
            )
            if (membersRes.ok) {
              setMembers(await membersRes.json())
            }

            // Fetch flights
            const flightsRes = await fetch(
              `${SUPABASE_URL}/rest/v1/flights?trip_slug=eq.${TRIP_SLUG}&select=*&order=leg_order.asc`,
              { headers }
            )
            if (flightsRes.ok) {
              setFlights(await flightsRes.json())
            }

            // Fetch seat assignments
            const seatsRes = await fetch(
              `${SUPABASE_URL}/rest/v1/seat_assignments?select=*`,
              { headers }
            )
            if (seatsRes.ok) {
              setSeatAssignments(await seatsRes.json())
            }

            // Fetch picks
            const picksRes = await fetch(
              `${SUPABASE_URL}/rest/v1/picks?trip_slug=eq.${TRIP_SLUG}&select=*`,
              { headers }
            )
            if (picksRes.ok) {
              setPicks(await picksRes.json())
            }

            // Fetch packing items
            const packingRes = await fetch(
              `${SUPABASE_URL}/rest/v1/packing_items?trip_slug=eq.${TRIP_SLUG}&select=*`,
              { headers }
            )
            if (packingRes.ok) {
              setPackingItems(await packingRes.json())
            }

            // Fetch budget
            const budgetRes = await fetch(
              `${SUPABASE_URL}/rest/v1/budget?trip_slug=eq.${TRIP_SLUG}&select=*&order=expense_date.desc`,
              { headers }
            )
            if (budgetRes.ok) {
              setBudgetItems(await budgetRes.json())
            }
          } catch (e) {
            console.error('Error fetching data:', e)
          }
        }

        fetchData()
      }, [])

      const copyConfirmation = (code) => {
        navigator.clipboard.writeText(code)
        setCopied(true)
        setTimeout(() => setCopied(false), 2000)
      }

      const togglePackedItem = async (id, packed) => {
        try {
          await fetch(
            `${SUPABASE_URL}/rest/v1/packing_items?id=eq.${id}`,
            {
              method: 'PATCH',
              headers,
              body: JSON.stringify({ packed: !packed })
            }
          )
          setPackingItems(items =>
            items.map(item => item.id === id ? { ...item, packed: !packed } : item)
          )
        } catch (e) {
          console.error('Error updating packing item:', e)
        }
      }

      const addPackingItem = async (item, category, member) => {
        try {
          const res = await fetch(
            `${SUPABASE_URL}/rest/v1/packing_items`,
            {
              method: 'POST',
              headers,
              body: JSON.stringify({
                trip_slug: TRIP_SLUG,
                item,
                category,
                member_name: member,
                packed: false
              })
            }
          )
          if (res.ok) {
            const newItem = await res.json()
            setPackingItems([...packingItems, newItem[0]])
          }
        } catch (e) {
          console.error('Error adding packing item:', e)
        }
      }

      const deletePackingItem = async (id) => {
        try {
          await fetch(
            `${SUPABASE_URL}/rest/v1/packing_items?id=eq.${id}`,
            { method: 'DELETE', headers }
          )
          setPackingItems(items => items.filter(item => item.id !== id))
        } catch (e) {
          console.error('Error deleting packing item:', e)
        }
      }

      const addBudgetItem = async (description, amount, category, member) => {
        try {
          const res = await fetch(
            `${SUPABASE_URL}/rest/v1/budget`,
            {
              method: 'POST',
              headers,
              body: JSON.stringify({
                trip_slug: TRIP_SLUG,
                description,
                amount: parseFloat(amount),
                category,
                member_name: member,
                expense_date: new Date().toISOString()
              })
            }
          )
          if (res.ok) {
            const newItem = await res.json()
            setBudgetItems([newItem[0], ...budgetItems])
          }
        } catch (e) {
          console.error('Error adding budget item:', e)
        }
      }

      const deleteBudgetItem = async (id) => {
        try {
          await fetch(
            `${SUPABASE_URL}/rest/v1/budget?id=eq.${id}`,
            { method: 'DELETE', headers }
          )
          setBudgetItems(items => items.filter(item => item.id !== id))
        } catch (e) {
          console.error('Error deleting budget item:', e)
        }
      }

      const addActivityPick = async (day) => {
        if (!newActivity.trim()) return
        try {
          const existing = picks.find(p => p.day_id === day && p.color_index === selectedMember)
          const activities = existing?.activities || []

          const res = await fetch(
            `${SUPABASE_URL}/rest/v1/picks`,
            {
              method: 'POST',
              headers,
              body: JSON.stringify({
                trip_slug: TRIP_SLUG,
                day_id: day,
                color_index: selectedMember,
                activities: [...activities, newActivity],
                restaurant: existing?.restaurant || null
              })
            }
          )
          if (res.ok) {
            const newPick = await res.json()
            setPicks([...picks.filter(p => p.id !== existing?.id), newPick[0]])
            setNewActivity('')
          }
        } catch (e) {
          console.error('Error adding activity:', e)
        }
      }

      const addRestaurantPick = async (day) => {
        if (!newRestaurant.trim()) return
        try {
          const existing = picks.find(p => p.day_id === day && p.color_index === selectedMember)
          const activities = existing?.activities || []

          const res = await fetch(
            `${SUPABASE_URL}/rest/v1/picks`,
            {
              method: 'POST',
              headers,
              body: JSON.stringify({
                trip_slug: TRIP_SLUG,
                day_id: day,
                color_index: selectedMember,
                activities,
                restaurant: newRestaurant
              })
            }
          )
          if (res.ok) {
            const newPick = await res.json()
            setPicks([...picks.filter(p => p.id !== existing?.id), newPick[0]])
            setNewRestaurant('')
          }
        } catch (e) {
          console.error('Error adding restaurant:', e)
        }
      }

      const getPackingStats = () => {
        const total = packingItems.length
        const packed = packingItems.filter(p => p.packed).length
        return { total, packed, percent: total > 0 ? Math.round((packed / total) * 100) : 0 }
      }

      const getTotalBudget = () => {
        return budgetItems.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0)
      }

      const getPerPersonSpending = (member) => {
        return budgetItems
          .filter(item => item.member_name === member)
          .reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0)
      }

      const renderTab = () => {
        if (activeTab === 'overview') {
          return (
            <div className="pb-20 bg-gradient-to-b from-cyan-50 to-blue-50 min-h-screen">
              <div className="p-4 space-y-4">
                {/* Countdown Card */}
                <div className="bg-gradient-to-br from-teal-400 to-cyan-500 rounded-2xl p-6 text-white shadow-lg">
                  <div className="text-center">
                    <div className="text-5xl font-bold">{daysRemaining}</div>
                    <div className="text-sm opacity-90">days until paradise</div>
                    <div className="mt-2 text-xs opacity-75">June 6, 2026</div>
                  </div>
                </div>

                {/* Trip Summary */}
                <div className="bg-white rounded-xl p-4 shadow-md">
                  <h2 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <Palmtree className="w-5 h-5 text-teal-600" />
                    St. Thomas, USVI
                  </h2>
                  <div className="space-y-2 text-sm">
                    <div className="text-gray-600">
                      <Calendar className="w-4 h-4 inline mr-2 text-teal-600" />
                      June 6 - 12, 2026 (7 days)
                    </div>
                    <div className="flex flex-wrap gap-2 mt-3">
                      {[0, 1, 2, 3].map(idx => (
                        <div key={idx} className="flex items-center gap-1">
                          <div className={`w-3 h-3 rounded-full ${memberColors[idx].bg}`}></div>
                          <span className="text-xs text-gray-700">{memberColors[idx].name}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Quick Stats */}
                <div className="grid grid-cols-3 gap-3">
                  <div className="bg-white rounded-lg p-3 shadow-md text-center">
                    <div className="text-2xl font-bold text-teal-600">${getTotalBudget().toFixed(0)}</div>
                    <div className="text-xs text-gray-600 mt-1">Total Budget</div>
                  </div>
                  <div className="bg-white rounded-lg p-3 shadow-md text-center">
                    <div className="text-2xl font-bold text-blue-600">{getPackingStats().percent}%</div>
                    <div className="text-xs text-gray-600 mt-1">Packed</div>
                  </div>
                  <div className="bg-white rounded-lg p-3 shadow-md text-center">
                    <div className="text-2xl font-bold text-purple-600">7</div>
                    <div className="text-xs text-gray-600 mt-1">Days Planned</div>
                  </div>
                </div>

                {/* Packing Progress Bar */}
                <div className="bg-white rounded-lg p-4 shadow-md">
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-sm font-semibold text-gray-700">Packing Progress</span>
                    <span className="text-xs text-gray-600">{getPackingStats().packed}/{getPackingStats().total}</span>
                  </div>
                  <div className="w-full bg-gray-200 rounded-full h-3">
                    <div
                      className="bg-gradient-to-r from-teal-400 to-cyan-500 h-3 rounded-full transition-all"
                      style={{ width: `${getPackingStats().percent}%` }}
                    ></div>
                  </div>
                </div>
              </div>
            </div>
          )
        }

        if (activeTab === 'flights') {
          return (
            <div className="pb-20 bg-gradient-to-b from-blue-50 to-cyan-50 min-h-screen p-4">
              <h1 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <Plane className="w-6 h-6 text-blue-600" />
                Flights
              </h1>

              {/* Outbound */}
              <div className="bg-white rounded-xl p-4 shadow-md mb-4">
                <div className="text-xs font-semibold text-teal-600 uppercase mb-2">Outbound</div>
                <div className="flex justify-between items-center mb-3">
                  <div className="text-center">
                    <div className="text-lg font-bold text-gray-800">STL</div>
                    <div className="text-xs text-gray-600">6:30 AM</div>
                  </div>
                  <div className="flex-1 text-center px-2">
                    <div className="text-xs text-gray-600 mb-1">WN3107</div>
                    <div className="border-t-2 border-teal-300 pt-1">
                      <span className="text-xs text-gray-600">2h 45m</span>
                    </div>
                  </div>
                  <div className="text-center">
                    <div className="text-lg font-bold text-gray-800">MCO</div>
                    <div className="text-xs text-gray-600">10:00 AM</div>
                  </div>
                </div>
                <div className="flex justify-between items-center">
                  <div className="text-center">
                    <div className="text-lg font-bold text-gray-800">MCO</div>
                    <div className="text-xs text-gray-600">11:15 AM</div>
                  </div>
                  <div className="flex-1 text-center px-2">
                    <div className="text-xs text-gray-600 mb-1">WN4999</div>
                    <div className="border-t-2 border-teal-300 pt-1">
                      <span className="text-xs text-gray-600">3h 45m</span>
                    </div>
                  </div>
                  <div className="text-center">
                    <div className="text-lg font-bold text-gray-800">STT</div>
                    <div className="text-xs text-gray-600">2:00 PM</div>
                  </div>
                </div>
                <div className="mt-4 pt-3 border-t">
                  <div
                    className="flex items-center gap-2 text-sm font-mono text-teal-600 cursor-pointer hover:text-teal-700"
                    onClick={() => copyConfirmation('AIO6OA')}
                  >
                    {copied ? <Check className="w-4 h-4" /> : <Copy className="w-4 h-4" />}
                    {copied ? 'Copied!' : 'AIO6OA'}
                  </div>
                </div>
              </div>

              {/* Return */}
              <div className="bg-white rounded-xl p-4 shadow-md mb-4">
                <div className="text-xs font-semibold text-purple-600 uppercase mb-2">Return</div>
                <div className="flex justify-between items-center">
                  <div className="text-center">
                    <div className="text-lg font-bold text-gray-800">STT</div>
                    <div className="text-xs text-gray-600">2:45 PM</div>
                  </div>
                  <div className="flex-1 text-center px-2">
                    <div className="text-xs text-gray-600 mb-1">WN6412</div>
                    <div className="border-t-2 border-purple-300 pt-1">
                      <span className="text-xs text-gray-600">5h 25m</span>
                    </div>
                  </div>
                  <div className="text-center">
                    <div className="text-lg font-bold text-gray-800">STL</div>
                    <div className="text-xs text-gray-600">11:10 PM</div>
                  </div>
                </div>
                <div className="mt-4 pt-3 border-t">
                  <div
                    className="flex items-center gap-2 text-sm font-mono text-purple-600 cursor-pointer hover:text-purple-700"
                    onClick={() => copyConfirmation('AIO6OA')}
                  >
                    {copied ? <Check className="w-4 h-4" /> : <Copy className="w-4 h-4" />}
                    {copied ? 'Copied!' : 'AIO6OA'}
                  </div>
                </div>
              </div>

              <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-800">
                <span className="font-semibold">Seats:</span> Check with your airline for seat assignments and updates.
              </div>
            </div>
          )
        }

        if (activeTab === 'picks') {
          const memberTabs = [0, 1, 2, 3]
          const dayPicks = picks.filter(p => p.day_id === selectedDay && p.color_index === selectedMember)
          const currentDayPicks = dayPicks.length > 0 ? dayPicks[0] : null

          return (
            <div className="pb-20 bg-gradient-to-b from-purple-50 to-pink-50 min-h-screen p-4">
              <h1 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <Sun className="w-6 h-6 text-yellow-500" />
                Daily Picks
              </h1>

              {/* Member Selector */}
              <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                {memberTabs.map(idx => (
                  <button
                    key={idx}
                    onClick={() => setSelectedMember(idx)}
                    className={`px-4 py-2 rounded-full whitespace-nowrap transition-all text-sm font-semibold ${
                      selectedMember === idx
                        ? `${memberColors[idx].bg} text-white shadow-md`
                        : `bg-white text-gray-700 border border-gray-200`
                    }`}
                  >
                    {memberColors[idx].name}
                  </button>
                ))}
              </div>

              {/* Day Selector */}
              <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                {tripDates.map(date => (
                  <button
                    key={date.id}
                    onClick={() => setSelectedDay(date.id)}
                    className={`px-3 py-2 rounded-lg whitespace-nowrap transition-all text-xs font-semibold ${
                      selectedDay === date.id
                        ? 'bg-teal-500 text-white shadow-md'
                        : 'bg-white text-gray-700 border border-gray-200'
                    }`}
                  >
                    {date.day.split(',')[0]}
                  </button>
                ))}
              </div>

              {/* Activities */}
              <div className="bg-white rounded-xl p-4 shadow-md mb-4">
                <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
                  <Zap className="w-5 h-5 text-yellow-500" />
                  Activities
                </h3>
                <div className="space-y-2 mb-3">
                  {currentDayPicks?.activities?.map((activity, idx) => (
                    <div key={idx} className="flex items-center gap-2 bg-gray-50 p-2 rounded text-sm text-gray-700">
                      <div className={`w-2 h-2 rounded-full ${memberColors[selectedMember].bg}`}></div>
                      {activity}
                    </div>
                  ))}
                </div>
                <div className="flex gap-2">
                  <input
                    type="text"
                    placeholder="Add activity..."
                    value={newActivity}
                    onChange={(e) => setNewActivity(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && addActivityPick(selectedDay)}
                    className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-400"
                  />
                  <button
                    onClick={() => addActivityPick(selectedDay)}
                    className="bg-teal-500 text-white px-3 py-2 rounded-lg hover:bg-teal-600 transition-colors"
                  >
                    <Plus className="w-4 h-4" />
                  </button>
                </div>
              </div>

              {/* Restaurant */}
              <div className="bg-white rounded-xl p-4 shadow-md">
                <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
                  <UtensilsCrossed className="w-5 h-5 text-orange-500" />
                  Restaurant
                </h3>
                {currentDayPicks?.restaurant && (
                  <div className="bg-orange-50 p-3 rounded-lg mb-3 text-sm font-medium text-gray-800">
                    {currentDayPicks.restaurant}
                  </div>
                )}
                <div className="flex gap-2">
                  <input
                    type="text"
                    placeholder="Add restaurant..."
                    value={newRestaurant}
                    onChange={(e) => setNewRestaurant(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && addRestaurantPick(selectedDay)}
                    className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
                  />
                  <button
                    onClick={() => addRestaurantPick(selectedDay)}
                    className="bg-orange-500 text-white px-3 py-2 rounded-lg hover:bg-orange-600 transition-colors"
                  >
                    <Plus className="w-4 h-4" />
                  </button>
                </div>
              </div>
            </div>
          )
        }

        if (activeTab === 'packing') {
          const filtered = packingFilter === 'all'
            ? packingItems
            : packingItems.filter(item => item.category === packingFilter)

          return (
            <div className="pb-20 bg-gradient-to-b from-green-50 to-emerald-50 min-h-screen p-4">
              <h1 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <ShoppingBag className="w-6 h-6 text-green-600" />
                Packing List
              </h1>

              {/* Category Filter */}
              <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                <button
                  onClick={() => setPackingFilter('all')}
                  className={`px-3 py-2 rounded-full whitespace-nowrap text-xs font-semibold transition-all ${
                    packingFilter === 'all'
                      ? 'bg-green-600 text-white shadow-md'
                      : 'bg-white text-gray-700 border border-gray-200'
                  }`}
                >
                  All
                </button>
                {packingCategories.map(cat => (
                  <button
                    key={cat}
                    onClick={() => setPackingFilter(cat)}
                    className={`px-3 py-2 rounded-full whitespace-nowrap text-xs font-semibold transition-all ${
                      packingFilter === cat
                        ? 'bg-green-600 text-white shadow-md'
                        : 'bg-white text-gray-700 border border-gray-200'
                    }`}
                  >
                    {cat}
                  </button>
                ))}
              </div>

              {/* Progress */}
              <div className="bg-white rounded-lg p-3 mb-4 shadow-md">
                <div className="flex justify-between items-center mb-2">
                  <span className="text-sm font-semibold text-gray-700">Progress</span>
                  <span className="text-lg font-bold text-green-600">{getPackingStats().percent}%</span>
                </div>
                <div className="w-full bg-gray-200 rounded-full h-3">
                  <div
                    className="bg-gradient-to-r from-green-400 to-emerald-500 h-3 rounded-full transition-all"
                    style={{ width: `${getPackingStats().percent}%` }}
                  ></div>
                </div>
              </div>

              {/* Add Item Form */}
              <PackingForm onAdd={addPackingItem} categories={packingCategories} />

              {/* Items List */}
              <div className="space-y-2">
                {filtered.map(item => (
                  <div
                    key={item.id}
                    className={`bg-white rounded-lg p-3 shadow-sm flex items-center gap-3 transition-all ${
                      item.packed ? 'opacity-60' : ''
                    }`}
                  >
                    <button
                      onClick={() => togglePackedItem(item.id, item.packed)}
                      className={`flex-shrink-0 w-5 h-5 rounded border-2 flex items-center justify-center transition-colors ${
                        item.packed
                          ? 'bg-green-500 border-green-500'
                          : 'border-gray-300 hover:border-green-500'
                      }`}
                    >
                      {item.packed && <Check className="w-3 h-3 text-white" />}
                    </button>
                    <div className="flex-1">
                      <div className={`text-sm font-medium ${item.packed ? 'line-through text-gray-500' : 'text-gray-800'}`}>
                        {item.item}
                      </div>
                      <div className="text-xs text-gray-600">{item.category}</div>
                    </div>
                    <button
                      onClick={() => deletePackingItem(item.id)}
                      className="text-gray-400 hover:text-red-500 transition-colors"
                    >
                      <X className="w-4 h-4" />
                    </button>
                  </div>
                ))}
              </div>

              {filtered.length === 0 && (
                <div className="text-center py-8 text-gray-500">
                  <ShoppingBag className="w-8 h-8 mx-auto mb-2 opacity-50" />
                  <p>No items in this category</p>
                </div>
              )}
            </div>
          )
        }

        if (activeTab === 'budget') {
          const groupedByDay = {}
          budgetItems.forEach(item => {
            const date = new Date(item.expense_date).toLocaleDateString()
            if (!groupedByDay[date]) groupedByDay[date] = []
            groupedByDay[date].push(item)
          })

          return (
            <div className="pb-20 bg-gradient-to-b from-yellow-50 to-orange-50 min-h-screen p-4">
              <h1 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <DollarSign className="w-6 h-6 text-green-600" />
                Budget
              </h1>

              {/* Summary Cards */}
              <div className="bg-white rounded-xl p-4 shadow-md mb-4">
                <div className="text-center">
                  <div className="text-4xl font-bold text-green-600">${getTotalBudget().toFixed(2)}</div>
                  <div className="text-sm text-gray-600 mt-1">Total Spent</div>
                </div>
              </div>

              {/* Per-Person Breakdown */}
              <div className="grid grid-cols-2 gap-2 mb-4">
                {[0, 1, 2, 3].map(idx => (
                  <div key={idx} className="bg-white rounded-lg p-3 shadow-sm">
                    <div className={`text-xs font-semibold ${memberColors[idx].text}`}>
                      {memberColors[idx].name}
                    </div>
                    <div className="text-lg font-bold text-gray-800 mt-1">
                      ${getPerPersonSpending(memberColors[idx].name).toFixed(2)}
                    </div>
                  </div>
                ))}
              </div>

              {/* Add Expense Form */}
              <BudgetForm onAdd={addBudgetItem} categories={budgetCategories} />

              {/* Expenses List */}
              <div className="space-y-4 mt-4">
                {Object.entries(groupedByDay).map(([date, items]) => (
                  <div key={date}>
                    <div className="text-xs font-semibold text-gray-600 uppercase mb-2">{date}</div>
                    <div className="space-y-2">
                      {items.map(item => (
                        <div key={item.id} className="bg-white rounded-lg p-3 shadow-sm flex justify-between items-start">
                          <div className="flex-1">
                            <div className="font-medium text-gray-800">{item.description}</div>
                            <div className="text-xs text-gray-600 mt-1">
                              <span>{item.member_name}</span> • <span>{item.category}</span>
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            <div className="text-right">
                              <div className="font-bold text-gray-800">${parseFloat(item.amount).toFixed(2)}</div>
                            </div>
                            <button
                              onClick={() => deleteBudgetItem(item.id)}
                              className="text-gray-400 hover:text-red-500 transition-colors"
                            >
                              <X className="w-4 h-4" />
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>

              {budgetItems.length === 0 && (
                <div className="text-center py-8 text-gray-500">
                  <DollarSign className="w-8 h-8 mx-auto mb-2 opacity-50" />
                  <p>No expenses yet</p>
                </div>
              )}
            </div>
          )
        }
      }

      return (
        <div className="bg-gradient-to-b from-cyan-50 to-blue-50 min-h-screen">
          {/* Header */}
          <div className="bg-gradient-to-r from-teal-500 to-cyan-600 text-white p-4 sticky top-0 z-10 shadow-lg">
            <div className="text-center">
              <div className="flex items-center justify-center gap-2 mb-1">
                <Palmtree className="w-5 h-5" />
                <h1 className="text-2xl font-bold">STT 2026</h1>
                <Sun className="w-5 h-5" />
              </div>
              <p className="text-xs opacity-90">St. Thomas Vacation</p>
            </div>
          </div>

          {/* Content */}
          {renderTab()}

          {/* Bottom Navigation */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg">
            <div className="flex justify-around">
              {[
                { id: 'overview', icon: Sun, label: 'Overview' },
                { id: 'flights', icon: Plane, label: 'Flights' },
                { id: 'picks', icon: Zap, label: 'Daily' },
                { id: 'packing', icon: ShoppingBag, label: 'Packing' },
                { id: 'budget', icon: DollarSign, label: 'Budget' }
              ].map(tab => {
                const Icon = tab.icon
                return (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex-1 py-3 flex flex-col items-center gap-1 transition-colors ${
                      activeTab === tab.id
                        ? 'text-teal-600 bg-teal-50'
                        : 'text-gray-600 hover:text-gray-800'
                    }`}
                  >
                    <Icon className="w-5 h-5" />
                    <span className="text-xs font-semibold">{tab.label}</span>
                  </button>
                )
              })}
            </div>
          </div>
        </div>
      )
    }

    function PackingForm({ onAdd, categories }) {
      const [item, setItem] = useState('')
      const [category, setCategory] = useState('Clothes')

      const handleSubmit = (e) => {
        e.preventDefault()
        if (item.trim()) {
          onAdd(item, category, '')
          setItem('')
        }
      }

      return (
        <form onSubmit={handleSubmit} className="bg-white rounded-xl p-4 shadow-md mb-4 space-y-3">
          <input
            type="text"
            placeholder="What to pack..."
            value={item}
            onChange={(e) => setItem(e.target.value)}
            className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
          />
          <select
            value={category}
            onChange={(e) => setCategory(e.target.value)}
            className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
          >
            {categories.map(cat => (
              <option key={cat} value={cat}>{cat}</option>
            ))}
          </select>
          <button
            type="submit"
            className="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors font-semibold flex items-center justify-center gap-2"
          >
            <Plus className="w-4 h-4" />
            Add Item
          </button>
        </form>
      )
    }

    function BudgetForm({ onAdd, categories }) {
      const [description, setDescription] = useState('')
      const [amount, setAmount] = useState('')
      const [category, setCategory] = useState('Food')
      const [member, setMember] = useState('Jay')

      const handleSubmit = (e) => {
        e.preventDefault()
        if (description.trim() && amount) {
          onAdd(description, amount, category, member)
          setDescription('')
          setAmount('')
        }
      }

      return (
        <form onSubmit={handleSubmit} className="bg-white rounded-xl p-4 shadow-md mb-4 space-y-3">
          <input
            type="text"
            placeholder="Description..."
            value={description}
            onChange={(e) => setDescription(e.target.value)}
            className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
          />
          <div className="grid grid-cols-2 gap-2">
            <input
              type="number"
              placeholder="Amount"
              step="0.01"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
              className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
            />
            <select
              value={category}
              onChange={(e) => setCategory(e.target.value)}
              className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
            >
              {categories.map(cat => (
                <option key={cat} value={cat}>{cat}</option>
              ))}
            </select>
          </div>
          <select
            value={member}
            onChange={(e) => setMember(e.target.value)}
            className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
          >
            <option>Jay</option>
            <option>Ashley</option>
            <option>Brylee</option>
            <option>Breea</option>
          </select>
          <button
            type="submit"
            className="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors font-semibold flex items-center justify-center gap-2"
          >
            <Plus className="w-4 h-4" />
            Add Expense
          </button>
        </form>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App))
  </script>
</body>
</html>
